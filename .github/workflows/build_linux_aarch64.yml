name: Build bpy for Linux aarch64 (manylinux_2_39)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Blender Tag to build'
        required: true
        default: 'v4.3.2'
      python_version:
        description: 'Python version to use'
        required: true
        default: '3.11.9'

  workflow_call:
    inputs:
      tag:
        description: 'Blender Tag to build'
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: true
        default: '3.11.9'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Set environment variables
        id: set_env
        run: |
          TAG=${{ inputs.tag || github.event.inputs.tag }}
          PYTHON_VERSION=${{ inputs.python_version || github.event.inputs.python_version }}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_ENV

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Blender using Docker
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -e TAG=${{ env.TAG }} \
            -e PYTHON_VERSION=${{ env.PYTHON_VERSION }} \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            ubuntu:24.04 \
            bash -c '
            set -e
            apt-get update
            apt-get install -y \
              build-essential \
              libssl-dev \
              libffi-dev \
              libreadline-dev \
              libbz2-dev \
              liblzma-dev \
              zlib1g-dev \
              git git-lfs \
              cmake \
              libx11-dev \
              libxxf86vm-dev \
              libxcursor-dev \
              libxi-dev \
              libxrandr-dev \
              libxinerama-dev \
              libxext-dev \
              wget \
              ca-certificates
            
            # Build Python from source
            PYTHON_VER=${{ env.PYTHON_VERSION }}
            cd /tmp
            wget https://www.python.org/ftp/python/${PYTHON_VER}/Python-${PYTHON_VER}.tgz
            tar xzf Python-${PYTHON_VER}.tgz
            cd Python-${PYTHON_VER}
            ./configure --enable-shared --enable-optimizations --enable-loadable-sqlite-extensions
            make -j$(nproc)
            make install
            ldconfig
            
            ln -sf /usr/local/bin/python3 /usr/local/bin/python
            ln -sf /usr/local/bin/pip3 /usr/local/bin/pip
            
            git lfs install
            
            cd /workspace
            python -m venv venv
            source venv/bin/activate
            python -m pip install --upgrade pip setuptools wheel
            pip install -r requirements.txt
            
            python -m src.buildbpy.main --tag ${{ env.TAG }} --install --publish
            '
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test built wheel in Docker
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -e PYTHON_VERSION=${{ env.PYTHON_VERSION }} \
            ubuntu:24.04 \
            bash -c '
            set -e
            apt-get update
            apt-get install -y \
              build-essential \
              libssl-dev \
              libffi-dev \
              libreadline-dev \
              libbz2-dev \
              liblzma-dev \
              zlib1g-dev \
              wget \
              ca-certificates
            
            # Build Python from source
            PYTHON_VER=${{ env.PYTHON_VERSION }}
            cd /tmp
            wget https://www.python.org/ftp/python/${PYTHON_VER}/Python-${PYTHON_VER}.tgz
            tar xzf Python-${PYTHON_VER}.tgz
            cd Python-${PYTHON_VER}
            ./configure --enable-shared --enable-optimizations
            make -j$(nproc)
            make install
            ldconfig
            
            ln -sf /usr/local/bin/python3 /usr/local/bin/python
            ln -sf /usr/local/bin/pip3 /usr/local/bin/pip
            
            cd /workspace
            python -m venv test_venv
            source test_venv/bin/activate
            pip install --upgrade pip
            pip install "numpy<2.0"
            pip install dist/*.whl
            
            python -c "
            import sys, traceback
            try:
                import numpy
                import bpy
                print(\"Imported bpy:\", bpy.app.version)
            except Exception:
                traceback.print_exc()
                sys.exit(1)
            "
            '
